<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - WD Máquinas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">WD</div>
                    <div class="sidebar-logo-text"><h1>WD Máquinas</h1><span>Orçamentos</span></div>
                </div>
                <button class="sidebar-toggle" id="sidebarCollapse" title="Recolher menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-nav-label">Menu</div>
                <a href="index.html" class="sidebar-link" title="Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="sidebar-link-text">Dashboard</span></a>
                <a href="orcamentos.html" class="sidebar-link" title="Orçamentos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="sidebar-link-text">Orçamentos</span></a>
                <a href="clientes.html" class="sidebar-link" title="Clientes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="sidebar-link-text">Clientes</span></a>
                <a href="produtos.html" class="sidebar-link" title="Produtos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span class="sidebar-link-text">Produtos</span></a>
                <a href="configuracoes.html" class="sidebar-link active" title="Configurações"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="sidebar-link-text">Configurações</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                    <h2>Configurações</h2>
                </div>
                <div class="header-right">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Alternar Tema"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header">
                        <h3>Dados da Empresa</h3>
                    </div>
                    <div class="card-body">
                        <form id="formConfig" onsubmit="salvarConfiguracoes(event)">
                            <!-- Logo -->
                            <div class="config-section">
                                <h4>Logo da Empresa</h4>
                                <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
                                    <div class="logo-preview" id="logoPreviewArea">
                                        <img id="logoPreviewImg" src="" alt="" style="display:none;">
                                        <span id="logoPlaceholder" style="color:var(--text-muted);font-size:12px;text-align:center;">Clique para<br>enviar logo</span>
                                        <input type="file" id="configLogoFile" accept="image/jpeg,image/png,image/webp" onchange="handleLogoUpload(event)">
                                    </div>
                                    <div>
                                        <p style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">JPG, PNG ou WEBP. Máx 2MB.</p>
                                        <button type="button" class="btn btn-outline btn-sm" id="btnRemoverLogo" style="display:none;" onclick="removerLogo()">Remover logo</button>
                                    </div>
                                </div>
                            </div>

                            <!-- Dados -->
                            <div class="config-section">
                                <h4>Informações da Empresa</h4>
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label>Nome da Empresa <span class="required">*</span></label>
                                        <input type="text" id="configNome" required placeholder="Nome da empresa">
                                    </div>
                                    <div class="form-group">
                                        <label>CNPJ</label>
                                        <input type="text" id="configCnpj" placeholder="00.000.000/0000-00">
                                    </div>
                                    <div class="form-group full-width">
                                        <label>Endereço</label>
                                        <input type="text" id="configEndereco" placeholder="Rua, número, bairro, cidade - UF">
                                    </div>
                                    <div class="form-group">
                                        <label>Complemento / Bairro / CEP</label>
                                        <input type="text" id="configBairroCep" placeholder="Bairro, CEP">
                                    </div>
                                    <div class="form-group">
                                        <label>Telefone</label>
                                        <input type="text" id="configTelefone" placeholder="(00) 00000-0000">
                                    </div>
                                    <div class="form-group">
                                        <label>Email</label>
                                        <input type="email" id="configEmail" placeholder="email@empresa.com">
                                    </div>
                                    <div class="form-group">
                                        <label>Site / Instagram</label>
                                        <input type="text" id="configSite" placeholder="@instagram ou www.site.com">
                                    </div>
                                </div>
                            </div>

                            <!-- Padrões do Orçamento -->
                            <div class="config-section">
                                <h4>Padrões do Orçamento</h4>
                                <div class="form-grid">
                                    <div class="form-group full-width">
                                        <label>Condições de Pagamento Padrão</label>
                                        <textarea id="configCondicoes" rows="3" placeholder="Texto padrão das condições de pagamento..."></textarea>
                                    </div>
                                    <div class="form-group">
                                        <label>Validade Padrão (dias)</label>
                                        <input type="number" id="configValidadeDias" min="1" max="365" value="30" placeholder="30">
                                    </div>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn btn-outline" onclick="restaurarPadrao()">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                                    Restaurar Padrão
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                                    Salvar Configurações
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script src="js/configuracoes.js"></script>
</body>
</html>
