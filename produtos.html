<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - WD Máquinas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">WD</div>
                    <div class="sidebar-logo-text"><h1>WD Máquinas</h1><span>Orçamentos</span></div>
                </div>
                <button class="sidebar-toggle" id="sidebarCollapse" title="Recolher menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-nav-label">Menu</div>
                <a href="index.html" class="sidebar-link" title="Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="sidebar-link-text">Dashboard</span></a>
                <a href="orcamentos.html" class="sidebar-link" title="Orçamentos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="sidebar-link-text">Orçamentos</span></a>
                <a href="clientes.html" class="sidebar-link" title="Clientes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="sidebar-link-text">Clientes</span></a>
                <a href="produtos.html" class="sidebar-link active" title="Produtos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span class="sidebar-link-text">Produtos</span></a>
                <a href="configuracoes.html" class="sidebar-link" title="Configurações"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="sidebar-link-text">Configurações</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                    <h2>Produtos</h2>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary btn-sm" onclick="abrirModalProduto()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Novo Produto
                    </button>
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Alternar Tema"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button>
                </div>
            </header>

            <div class="page-content">
                <div class="actions-bar">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="buscaProduto" placeholder="Buscar produto..." oninput="buscarProdutos()">
                    </div>
                </div>

                <div class="card">
                    <div class="card-body-no-pad">
                        <div class="table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Imagem</th>
                                        <th>Produto</th>
                                        <th>Dimensões</th>
                                        <th>Peso</th>
                                        <th>Valor</th>
                                        <th>Status</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tbodyProdutos">
                                    <tr><td colspan="7"><div class="spinner"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Produto -->
    <div class="modal-overlay" id="modalProduto">
        <div class="modal" style="max-width:720px">
            <div class="modal-header">
                <h3 id="modalProdutoTitulo">Novo Produto</h3>
                <button class="modal-close" onclick="fecharModalProduto()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="modal-body">
                <form id="formProduto" onsubmit="salvarProduto(event)">
                    <input type="hidden" id="produtoId">
                    <input type="hidden" id="produtoImagemBase64" value="">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Nome do Produto <span class="required">*</span></label>
                            <input type="text" id="produtoNome" required placeholder="Ex: Marmiteiro Elétrico 50 Marmitas">
                        </div>
                        <div class="form-group full-width">
                            <label>Imagem do Produto (JPG, PNG, WEBP - máx 2MB)</label>
                            <div class="img-upload-area" id="imgUploadArea">
                                <div class="upload-placeholder" id="uploadPlaceholder">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                    <div>Clique ou arraste para enviar imagem</div>
                                </div>
                                <img id="imgPreview" src="" alt="" style="display:none;">
                                <input type="file" id="produtoImagemFile" accept="image/jpeg,image/png,image/webp" onchange="handleImageUpload(event)">
                            </div>
                            <button type="button" class="btn btn-outline btn-sm" id="btnRemoverImagem" style="display:none;margin-top:8px;" onclick="removerImagemProduto()">Remover imagem</button>
                        </div>
                        <div class="form-group full-width">
                            <label>Descrição</label>
                            <textarea id="produtoDescricao" placeholder="Descrição breve do produto..."></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>Especificações</label>
                            <textarea id="produtoEspecificacoes" rows="4" placeholder="Especificações técnicas detalhadas..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Valor (R$) <span class="required">*</span></label>
                            <input type="number" id="produtoValor" required min="0.01" step="0.01" placeholder="0,00">
                        </div>
                        <div class="form-group">
                            <label>Altura (CM)</label>
                            <input type="number" id="produtoAltura" min="0" step="0.1" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Largura (CM)</label>
                            <input type="number" id="produtoLargura" min="0" step="0.1" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Profundidade (CM)</label>
                            <input type="number" id="produtoProfundidade" min="0" step="0.1" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Peso (KG)</label>
                            <input type="number" id="produtoPeso" min="0" step="0.1" placeholder="0">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="fecharModalProduto()">Cancelar</button>
                <button class="btn btn-primary" onclick="document.getElementById('formProduto').requestSubmit()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal Confirmar Exclusão -->
    <div class="modal-overlay" id="modalConfirmDelete">
        <div class="modal" style="max-width:420px">
            <div class="modal-body">
                <div class="confirm-dialog">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    <h4>Excluir Produto?</h4>
                    <p>Esta ação não pode ser desfeita.</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="fecharConfirmDelete()">Cancelar</button>
                <button class="btn btn-danger" id="btnConfirmDelete">Excluir</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script src="js/produtos.js"></script>
</body>
</html>
