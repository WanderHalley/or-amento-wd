<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Orçamento - WD Máquinas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>WD Máquinas</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><span>📊</span> Dashboard</a>
                <a href="orcamentos.html" class="nav-link"><span>📋</span> Orçamentos</a>
                <a href="clientes.html" class="nav-link"><span>👥</span> Clientes</a>
                <a href="produtos.html" class="nav-link"><span>📦</span> Produtos</a>
                <a href="configuracoes.html" class="nav-link"><span>⚙️</span> Configurações</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div style="display:flex;align-items:center;gap:10px;">
                    <a href="orcamentos.html" class="btn btn-secondary btn-sm">← Voltar</a>
                    <h1>Visualizar Orçamento</h1>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle">🌙</button>
                </div>
            </header>

            <div class="content-area">
                <div class="preview-actions" style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
                    <button class="btn btn-primary" id="btnSalvarPDF">📄 Salvar PDF</button>
                    <button class="btn btn-success" id="btnWhatsApp">📱 WhatsApp</button>
                    <button class="btn btn-info" id="btnEnviarEmail">📧 Enviar Email</button>
                    <button class="btn btn-secondary" id="btnImprimir">🖨️ Imprimir</button>
                </div>

                <div id="previewArea">
                    <div class="loading-cell"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Email -->
    <div class="modal-overlay" id="modalEmail">
        <div class="modal">
            <div class="modal-header">
                <h3>Enviar Orçamento por Email</h3>
                <button class="modal-close" id="btnFecharModalEmail">&times;</button>
            </div>
            <div class="form-grid">
                <div class="form-group form-group-full">
                    <label for="emailDestinatario">Destinatário *</label>
                    <input type="email" id="emailDestinatario" class="form-input" required>
                </div>
                <div class="form-group form-group-full">
                    <label for="emailAssunto">Assunto</label>
                    <input type="text" id="emailAssunto" class="form-input">
                </div>
                <div class="form-group form-group-full">
                    <label for="emailMensagem">Mensagem</label>
                    <textarea id="emailMensagem" class="form-input" rows="6"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="btnCancelarEmail">Cancelar</button>
                <button class="btn btn-primary" id="btnEnviarEmailConfirm">📧 Enviar</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script src="js/preview.js"></script>
</body>
</html>
