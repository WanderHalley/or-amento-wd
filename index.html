                <!-- Últimos Orçamentos -->

                    <div class="card-body">

                                </thead>
                                <tbody id="tabelaUltimosOrcamentos">

                                        <td colspan="6" style="text-align:center; padding:40px;">

    <!-- Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        /**
         * Dashboard — index.html
         * Parsing corrigido para os formatos REAIS da API:
         *   /api/dashboard   → { total_clientes, total_produtos_ativos, ... }
         *   /api/orcamentos  → { orcamentos: [...], total }
         */

        document.addEventListener('DOMContentLoaded', async () => {
            // app.js cuida do tema e sidebar
            await carregarDashboard();
            await carregarUltimosOrcamentos();
        });

        // ========== HELPERS com fallback ==========
        function fmtCurrency(v) {
            if (typeof formatCurrency === 'function') return formatCurrency(v);
            return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',');
        }
        function fmtDate(d) {
            if (typeof formatDate === 'function') return formatDate(d);
            if (!d) return '-';
            const parts = d.split('-');
            if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
            return d;
        }
        function safeEscape(s) {
            if (typeof escapeHtml === 'function') return escapeHtml(s);
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        // ========== DASHBOARD ==========
        async function carregarDashboard() {
            try {
                const data = await apiGet('/api/dashboard');
                console.log('[Dashboard] Resposta:', data);

                // API retorna direto: { total_clientes, total_produtos_ativos, ... }
                // Sem wrapper "success" ou "data"
                const el = (id) => document.getElementById(id);

                const clientes = data.total_clientes ?? 0;
                const produtos = data.total_produtos_ativos ?? 0;
                const pendentes = data.total_orcamentos_pendentes ?? 0;
                const aprovados = data.total_valor_aprovados ?? 0;

                if (el('statClientes')) el('statClientes').textContent = clientes;
                if (el('statProdutos')) el('statProdutos').textContent = produtos;
                if (el('statPendentes')) el('statPendentes').textContent = pendentes;
                if (el('statAprovados')) el('statAprovados').textContent = fmtCurrency(aprovados);

            } catch (error) {
                console.error('[Dashboard] Erro:', error);
                const el = (id) => document.getElementById(id);
                if (el('statClientes')) el('statClientes').textContent = '0';
                if (el('statProdutos')) el('statProdutos').textContent = '0';
                if (el('statPendentes')) el('statPendentes').textContent = '0';
                if (el('statAprovados')) el('statAprovados').textContent = 'R$ 0,00';
            }
        }

        // ========== ÚLTIMOS ORÇAMENTOS ==========
        async function carregarUltimosOrcamentos() {
            const tbody = document.getElementById('tabelaUltimosOrcamentos');
            if (!tbody) return;

            try {
                const data = await apiGet('/api/orcamentos?limit=10');
                console.log('[Dashboard] Orçamentos resposta:', data);

                // API retorna: { orcamentos: [...], total }
                const orcamentos = data.orcamentos || data.data || data || [];

                if (!Array.isArray(orcamentos) || orcamentos.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align:center; padding:40px;">
                                <p>Nenhum orçamento encontrado.</p>
                                <a href="orcamentos.html?novo=1" class="btn btn-primary btn-sm" style="margin-top:10px;">Criar primeiro orçamento</a>
                            </td>
                        </tr>`;
                    return;
                }

                tbody.innerHTML = orcamentos.map(orc => {
                    const numero = orc.numero || orc.numero_orcamento || orc.id?.substring(0, 8) || '-';
                    const clienteNome = orc.cliente_nome || orc.cliente?.nome || '-';
                    const dataStr = fmtDate(orc.data_emissao || orc.created_at);
                    const valor = fmtCurrency(orc.valor_total || 0);
                    const status = orc.status || 'pendente';

                    const badgeClass = {
                        'pendente': 'badge-warning',
                        'aprovado': 'badge-success',
                        'recusado': 'badge-danger',
                        'expirado': 'badge-secondary'
                    }[status] || 'badge-secondary';

                    const statusLabel = {
                        'pendente': 'Pendente',
                        'aprovado': 'Aprovado',
                        'recusado': 'Recusado',
                        'expirado': 'Expirado'
                    }[status] || status;

                    return `
                        <tr>
                            <td><strong>#${safeEscape(String(numero))}</strong></td>
                            <td>${safeEscape(clienteNome)}</td>
                            <td>${dataStr}</td>
                            <td><strong>${valor}</strong></td>
                            <td><span class="badge ${badgeClass}">${statusLabel}</span></td>
                            <td>
                                <a href="preview.html?id=${orc.id}" class="btn btn-secondary btn-sm" title="Visualizar">👁️</a>
                            </td>
                        </tr>`;
                }).join('');

            } catch (error) {
                console.error('[Dashboard] Erro ao carregar orçamentos:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align:center; padding:40px;">
                            <p>Erro ao carregar orçamentos.</p>
                        </td>
                    </tr>`;
            }
        }
    </script>
</body>
