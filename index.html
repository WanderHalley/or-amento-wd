        <!-- ========== SIDEBAR ========== -->

            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-nav-label">Menu</div>
                <a href="index.html" class="sidebar-link active" title="Dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                    </svg>
                    <span class="sidebar-link-text">Dashboard</span>
                </a>
                <a href="orcamentos.html" class="sidebar-link" title="Orçamentos">

                    <span class="sidebar-link-text">Orçamentos</span>
                </a>
                <a href="clientes.html" class="sidebar-link" title="Clientes">

                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>

                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span class="sidebar-link-text">Clientes</span>
                </a>
                <a href="produtos.html" class="sidebar-link" title="Produtos">

                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                    </svg>
                    <span class="sidebar-link-text">Produtos</span>
                </a>
                <a href="configuracoes.html" class="sidebar-link" title="Configurações">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span class="sidebar-link-text">Configurações</span>

            </nav>
        </aside>

        <!-- ========== MAIN ========== -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <h2>Dashboard</h2>
                </div>
                <div class="header-right">
                    <a href="orcamentos.html?novo=1" class="btn btn-primary btn-sm">+ Novo Orçamento</a>
                    <button class="theme-toggle" id="themeToggle" title="Alternar tema">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Content -->
            <div class="page-content">

                <!-- Stat Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="statClientes">-</h3>
                            <p>Clientes cadastrados</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="statProdutos">-</h3>
                            <p>Produtos ativos</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="statPendentes">-</h3>
                            <p>Orçamentos pendentes</p>
                        </div>
                    </div>
                    <div class="stat-card stat-highlight">
                        <div class="stat-icon red">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="1" x2="12" y2="23"/>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="statAprovados">R$ -</h3>
                            <p>Total aprovados</p>
                        </div>
                    </div>
                </div>

                <!-- Últimos Orçamentos -->
                <div class="card">
                    <div class="card-header">
                        <h3>Últimos Orçamentos</h3>
                        <a href="orcamentos.html" class="btn btn-secondary btn-sm">Ver todos</a>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Cliente</th>
                                        <th>Data</th>
                                        <th>Valor</th>
                                        <th>Status</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaUltimosOrcamentos">
                                    <tr>
                                        <td colspan="6" style="text-align:center; padding:40px;">
                                            <div class="spinner"></div>
                                            <p>Carregando...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div><!-- .page-content -->
        </main>
    </div><!-- .app-layout -->

    <!-- Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await carregarDashboard();
            await carregarUltimosOrcamentos();
        });

        function fmtCurrency(v) {
            if (typeof formatCurrency === 'function') return formatCurrency(v);
            return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',');
        }

        function fmtDate(d) {
            if (typeof formatDate === 'function') return formatDate(d);
            if (!d) return '-';
            const part = d.split('T')[0].split('-');
            if (part.length === 3) return part[2] + '/' + part[1] + '/' + part[0];
            return d;
        }

        function safeEscape(s) {
            if (typeof escapeHtml === 'function') return escapeHtml(s);
            const div = document.createElement('div');
            div.textContent = String(s || '');
            return div.innerHTML;
        }

        async function carregarDashboard() {
            const el = (id) => document.getElementById(id);
            try {
                const data = await apiGet('/api/dashboard');
                console.log('[Dashboard] Resposta:', data);
                const clientes = data.total_clientes ?? 0;
                const produtos = data.total_produtos_ativos ?? 0;
                const pendentes = data.total_orcamentos_pendentes ?? 0;
                const aprovados = data.total_valor_aprovados ?? 0;
                if (el('statClientes')) el('statClientes').textContent = clientes;
                if (el('statProdutos')) el('statProdutos').textContent = produtos;
                if (el('statPendentes')) el('statPendentes').textContent = pendentes;
                if (el('statAprovados')) el('statAprovados').textContent = fmtCurrency(aprovados);
            } catch (error) {
                console.error('[Dashboard] Erro ao carregar stats:', error);
                if (el('statClientes')) el('statClientes').textContent = '0';
                if (el('statProdutos')) el('statProdutos').textContent = '0';
                if (el('statPendentes')) el('statPendentes').textContent = '0';
                if (el('statAprovados')) el('statAprovados').textContent = 'R$ 0,00';
            }
        }

        async function carregarUltimosOrcamentos() {
            const tbody = document.getElementById('tabelaUltimosOrcamentos');
            if (!tbody) return;
            try {
                const data = await apiGet('/api/orcamentos?limit=10');
                console.log('[Dashboard] Orçamentos resposta:', data);
                const orcamentos = data.orcamentos || data.data || [];
                if (!Array.isArray(orcamentos) || orcamentos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;"><p>Nenhum orçamento encontrado.</p><a href="orcamentos.html?novo=1" class="btn btn-primary btn-sm" style="margin-top:10px;">Criar primeiro orçamento</a></td></tr>';
                    return;
                }
                tbody.innerHTML = orcamentos.map(orc => {
                    const numero = orc.numero || orc.numero_orcamento || '-';
                    const clienteNome = orc.cliente_nome || orc.cliente?.nome || '-';
                    const dataStr = fmtDate(orc.data_emissao || orc.created_at);
                    const valor = fmtCurrency(orc.valor_total || 0);
                    const status = orc.status || 'pendente';
                    const badgeClass = { 'pendente':'badge-pendente','aprovado':'badge-aprovado','recusado':'badge-recusado','expirado':'badge-expirado' }[status] || 'badge-expirado';
                    const statusLabel = { 'pendente':'Pendente','aprovado':'Aprovado','recusado':'Recusado','expirado':'Expirado' }[status] || status;
                    return '<tr><td><strong>#' + safeEscape(String(numero)) + '</strong></td><td>' + safeEscape(clienteNome) + '</td><td>' + dataStr + '</td><td><strong>' + valor + '</strong></td><td><span class="badge ' + badgeClass + '">' + statusLabel + '</span></td><td><a href="preview.html?id=' + orc.id + '" class="btn btn-secondary btn-sm" title="Visualizar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></a></td></tr>';
                }).join('');
            } catch (error) {
                console.error('[Dashboard] Erro ao carregar orçamentos:', error);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;"><p>Erro ao carregar orçamentos.</p></td></tr>';
            }
        }
    </script>
</body>
</html>
